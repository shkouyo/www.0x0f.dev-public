name: Build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Zola Rev
        id: zola-rev
        run: echo "rev=$(git ls-remote https://github.com/getzola/zola.git HEAD | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: zola-build
          cache-all-crates: "true"
          cache-directories: |
            ~/.cargo/target-install

      - name: Cache Zola
        id: cache-zola
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/zola
          key: zola-bin-${{ runner.os }}-${{ steps.zola-rev.outputs.rev }}-indexing-zh-indexing-ja

      - name: Clone
        run: |
          git clone https://codeberg.org/shkouyo/www.0x0f.dev.git "$RUNNER_TEMP/www.0x0f.dev"
          git -C "$RUNNER_TEMP/www.0x0f.dev" submodule sync --recursive
          git -C "$RUNNER_TEMP/www.0x0f.dev" submodule update --init --recursive

      - name: Site Dir
        run: |
          if [ -f "$RUNNER_TEMP/www.0x0f.dev/zola.toml" ]; then
            echo "SITE_DIR=$RUNNER_TEMP/www.0x0f.dev" >> "$GITHUB_ENV"
          elif [ -f "$RUNNER_TEMP/www.0x0f.dev/www.0x0f.dev/zola.toml" ]; then
            echo "SITE_DIR=$RUNNER_TEMP/www.0x0f.dev/www.0x0f.dev" >> "$GITHUB_ENV"
          else
            echo "zola.toml not found" >&2
            exit 1
          fi

      - name: Zola
        if: steps.cache-zola.outputs.cache-hit != 'true'
        run: CARGO_TARGET_DIR=~/.cargo/target-install cargo install --git https://github.com/getzola/zola.git --rev "${{ steps.zola-rev.outputs.rev }}" --features indexing-zh,indexing-ja zola --locked

      - name: Build Site
        run: |
          cd "$SITE_DIR"
          ~/.cargo/bin/zola build --output-dir=public --minify --force

      - name: Update Public
        run: |
          mkdir -p public
          rsync -a --delete "$SITE_DIR/public/" ./public/

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public
          if git diff --cached --quiet; then
            exit 0
          fi
          TS="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git commit -m "chore(public): ${TS}"
          git push origin HEAD:main
